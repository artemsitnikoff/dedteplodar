services:
  bot:
    build: .
    command: python main_bot.py
    env_file:
      - .env
    volumes:
      - ./base:/app/base          # knowledge base: DB, embeddings, PDFs, FAQ
      - ./data:/app/data          # shared with ArkadiyJarvis: .claude_token.json
      - hf_cache:/root/.cache/huggingface
    restart: unless-stopped

  admin:
    build: .
    command: uvicorn admin.main:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    env_file:
      - .env
    volumes:
      - ./base:/app/base
      - ./data:/app/data
      - hf_cache:/root/.cache/huggingface
    restart: unless-stopped

volumes:
  hf_cache:
