################################################################################
# Справочник компании «Теплодар» — для ответов бота на вопросы о компании
# Источник: teplodar.ru (скрапинг май 2026)
# Обновлять при изменении контактов / условий
################################################################################

company:
  name: "Группа компаний «Теплодар»"
  founded: 1997
  founder: "Юрий Степанович Левчук"
  description: >
    Российский производитель печей, котлов и каминов. Основана в 1997 году,
    первая российская компания с промышленным производством печей.
    Более 30 моделей и 100 модификаций котлов, печей, каминов.
    Собственное конструкторское бюро, три производственных предприятия
    площадью более 20 000 м² в Новосибирске.
  brands:
    - "Теплодар® — печи для бани, отопительные печи и камины"
    - "Куппер® — отопительные котлы"
    - "Тарий® — походное оборудование"
  website: "https://www.teplodar.ru"

contacts:
  hot_line:
    name: "Горячая линия завода"
    phone: "8 800 775-03-07"
    hours: "ежедневно 10:00–21:00 (НСК)"
    note: "Звонок бесплатный по России"
  online_store:
    name: "Интернет-магазин"
    phone: "8 800 101-43-53"
    hours: "ежедневно 9:00–20:00 (НСК)"
    whatsapp: true
    note: "Звонок бесплатный по России"
  quality_dept:
    name: "Отдел качества (проблемы с продукцией)"
    phone: "+7 (999) 303-09-27"
    hours: "ежедневно 8:00–17:00 (НСК)"
    whatsapp: true

own_stores:
  city: "Новосибирск"
  stores:
    - name: "Фирменный магазин «Теплодар»"
      address: "ул. Тайгинская, 15/1"
      hours_weekdays: "пн–пт 10:00–19:00"
      hours_saturday: "сб 10:00–17:00"
      hours_sunday: "вс 10:00–17:00"
      phones:
        - "+7 (383) 363-91-02"
        - "+7 (923) 118-53-42"
    - name: "Фирменный магазин «Теплодар»"
      address: "ул. Большевистская, 26А"
      hours_weekdays: "пн–пт 10:00–19:00"
      hours_saturday: "сб 10:00–17:00"
      hours_sunday: "закрыто"
      phones:
        - "+7 (383) 362-04-38"
        - "+7 (923) 118-59-55"
  note: >
    Самовывоз возможен только в Новосибирске — с завода или из фирменных магазинов.
    Оплата при получении доступна только при самовывозе.

dealers:
  description: >
    Продукцию «Теплодар» можно купить в магазинах партнёрской сети по всей России.
    840 магазинов в 334 городах. Цены в регионе едины.
    По наличию конкретных моделей уточняйте в магазинах.
  dealers_data_file: "data/dealers.yaml"
  find_dealers_url: "https://www.teplodar.ru/contacts/"
  regions_covered: >
    Все регионы России + СНГ (Казахстан, Беларусь, Армения, Киргизия, Узбекистан,
    Таджикистан, Молдова) и другие страны (Монголия, Сербия, Латвия).
  bot_instruction: >
    Когда пользователь спрашивает о магазине или дилере — сначала уточни город.
    После получения города — найди его в dealers.yaml (или company_faq.yaml/own_stores для
    Новосибирска), выдай список магазинов с адресом, телефоном и режимом работы.
    В конце добавь: «Полный список магазинов в вашем регионе: teplodar.ru/contacts/»

delivery:
  main_rule: >
    Бесплатная доставка по всей России, если в заказе есть котёл или печь.
    Доставка — до ближайшего терминала транспортной компании в вашем городе.
  exceptions:
    - "Норильск: только платная доставка (из-за высокой стоимости перевозки)"
  dispatch_time: "Отгрузка на 2–3-й рабочий день после зачисления оплаты"
  tracking: "После отгрузки выдаётся трек-номер для отслеживания"
  pickup_at_delivery: "При получении товара необходим паспорт"
  damage_check: >
    При получении обязательно проверить целостность. При повреждениях —
    зафиксировать в акте приёмки груза до подписания документов.
  self_pickup: "Только Новосибирск: с завода или из фирменных магазинов"

payment:
  methods:
    - name: "Банковская карта МИР / VISA / Mastercard"
      note: "Карты иностранных банков — только МИР"
    - name: "Система быстрых платежей (СБП)"
    - name: "Банковский перевод"
      note: "Юр. лицам. Отправка после поступления денег (1–3 рабочих дня)"
    - name: "Наличные / оплата при получении"
      note: "Только при самовывозе из магазинов Новосибирска"
  installment:
    - name: "Яндекс Сплит"
      terms: "2, 4 или 6 месяцев. Без кредитной истории. Минимальный заказ от 10 000 руб."
    - name: "Рассрочка Сбербанка"
      terms: "6 или 10 месяцев"
    - name: "Рассрочка картой «Халва» (Совкомбанк)"
      terms: "6 или 10 месяцев"
    - name: "Кредит от Т-Банка"
      terms: "3–36 месяцев, ставка 24–29% (определяет банк индивидуально)"

warranty:
  general: "Гарантия на всю продукцию — от 1 года до 5 лет"
  details: >
    В рамках одного товара разные части могут иметь разные гарантийные сроки —
    указано в фирменных документах на продукцию (идут в комплекте, также
    доступны для скачивания на карточке товара на сайте).
  service_condition: >
    Гарантийный ремонт выполняется авторизованными сервисными центрами (АСЦ).
    Обязательно наличие гарантийного талона с: наименованием товара,
    гарантийным сроком, датой продажи, серийным номером.

return_policy:
  good_quality:
    period: "14 дней"
    conditions: >
      Товар не использовался, сохранены товарный вид, потребительские свойства,
      пломбы, ярлыки, имеется чек или подтверждающий оплату документ.
    exception: "Газовая продукция надлежащего качества возврату не подлежит"
    law: "Статья 25 Закона «О защите прав потребителей»"
  defective:
    procedure: >
      Обратиться в АСЦ или магазин, где куплена продукция. Будет проведена экспертиза.
      При подтверждении заводского брака — гарантийный ремонт / обмен / возврат денег.
    law: "Статьи 18–24 Закона «О защите прав потребителей»"

services:
  authorized_centers:
    description: >
      Авторизованные Сервисные Центры (АСЦ) оказывают помощь в проектировании
      систем отопления и дымоходов, монтаже печей, котлов и дымоходов.
      Специалисты АСЦ проходят специальное обучение завода.
    find_url: "https://www.teplodar.ru/service/"
  calculators:
    - name: "Калькулятор дымохода"
      url: "https://www.teplodar.ru/help/calc_dymohod/"
    - name: "Калькулятор отопления"
      url: "https://www.teplodar.ru/help/calc_otoplenie/"
  catalog_2025:
    url: "https://www.teplodar.ru"
    note: "Каталог 2025 доступен для скачивания на главной странице сайта (56 МБ PDF)"

faq:
  - q: "Где ваш магазин? / Есть ли магазин в моём городе?"
    bot_logic: >
      СПРОСИ ГОРОД: «В каком городе вы находитесь?»
      После ответа — найди город в dealers.yaml (ключ cities.<Город>).
      Выдай список магазинов: название, адрес, телефоны, режим работы.
      Для Новосибирска также покажи фирменные магазины из own_stores.
      В конце добавь: «Полный список магазинов в вашем регионе — teplodar.ru/contacts/»
      Если города нет в dealers.yaml — ответь что дилеров в этом городе нет,
      предложи ближайший крупный город или интернет-магазин с бесплатной доставкой.
    example_answer: >
      Уточните, пожалуйста, ваш город — я найду ближайшие магазины с адресами и телефонами.

  - q: "Есть ли дилер в [городе]? / Где купить в [городе]?"
    bot_logic: >
      Найди <Город> в dealers.yaml → cities.<Город>.
      Выдай полный список: для каждого магазина — название, адрес, телефоны, режим работы.
      Если есть is_service: true — пометь «(сервисный центр)».
      Если есть own_store: true — пометь «(фирменный магазин Теплодар)».
      В конце ВСЕГДА добавляй: «Подробный список по региону и карта — teplodar.ru/contacts/»
    example_ekaterinburg: >
      В Екатеринбурге продукцию «Теплодар» можно купить в следующих магазинах:
      [список из dealers.yaml для 'Екатеринбург']
      Подробный список по региону и карта — teplodar.ru/contacts/

  - q: "Доставляете ли вы в [город]?"
    a: >
      Доставляем по всей России бесплатно (кроме Норильска), если в заказе есть печь или котёл.
      Доставка до терминала транспортной компании в вашем городе.
      Отгрузка на 2–3-й рабочий день после зачисления оплаты.

  - q: "Можно ли купить в рассрочку?"
    a: >
      Да. Доступны: Яндекс Сплит (2–6 мес.), рассрочка Сбербанка (6 или 10 мес.),
      карта «Халва» (6 или 10 мес.), кредит Т-Банка (3–36 мес., 24–29%).

  - q: "Какая гарантия?"
    a: >
      От 1 до 5 лет в зависимости от модели и её компонентов. Точный срок —
      в гарантийном талоне, который идёт в комплекте. Документы также доступны
      на карточке товара на сайте.

  - q: "Как связаться?"
    a: >
      Интернет-магазин: 8 800 101-43-53 (бесплатно, ежедневно 9–20 НСК), WhatsApp.
      Горячая линия завода: 8 800 775-03-07 (бесплатно, ежедневно 10–21 НСК).

  - q: "Можно ли вернуть товар?"
    a: >
      Да, в течение 14 дней, если товар не использовался и сохранён товарный вид.
      Исключение: газовая продукция надлежащего качества — возврату не подлежит.

  - q: "Когда вы работаете?"
    a: >
      Интернет-магазин: ежедневно 9:00–20:00 (НСК). Горячая линия: ежедневно 10:00–21:00 (НСК).
      Фирменные магазины в Новосибирске: пн–пт 10:00–19:00, сб 10:00–17:00.

  - q: "Где производят печи?"
    a: >
      Производство в Новосибирске. Три производственных предприятия полного цикла,
      площадь более 20 000 м². Компания основана в 1997 году.

  - q: "Есть ли скидки?"
    a: >
      Периодически проводятся акции и сезонные скидки (до -25% на популярные товары).
      Актуальные акции — на главной странице teplodar.ru.
